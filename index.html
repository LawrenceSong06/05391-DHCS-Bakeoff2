<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Bakeoff 2: Select A Version</title>
		<style type="text/css">
            #versions{
                display: flex;
                flex-direction: column;
            }
		</style>
	</head>
	<body>
        <h1>
            Please Select A Version:
        </h1>
        <div id="versions"></div>
	</body>
	<script delay>
        const VERSIONS = [
            "V1",
            "V2"
        ]

        let versions = document.getElementById("versions");
        VERSIONS.map((v) => {
            let a = document.createElement("a");
            a.href = `./${v}`;
            a.innerText = `${v}`;
            versions.appendChild(a);

            return v;
        })
    </script>
</html>
